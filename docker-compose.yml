services:
  ros_humble:
    build:
      context: .
      args:
        USER_NAME: ${USER_NAME}
        USER_ID: ${USER_ID}
        USER_GID: ${USER_GID}
    image: ros_template:humble
    container_name: ros_humble_dev
    hostname: ros-humble-dev
    env_file:
      - .env
    environment:
      DISPLAY: ${DISPLAY:-:0}
    volumes:
      - .:/app
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    group_add:
      - dialout
      - sudo
    network_mode: host
    stdin_open: true
    tty: true
